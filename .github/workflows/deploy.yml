name: Deploy to Hugging Face Spaces
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Login to HF Hub
        uses: huggingface/login@v1
        with:
          token: ${{ secrets.HF_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        env:
          HF_NAMESPACE: ${{ vars.HF_NAMESPACE || github.repository_owner }}
          HF_SPACE_NAME: ${{ vars.HF_SPACE_NAME || 'papermind' }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --tag registry.hf.space/$HF_NAMESPACE/$HF_SPACE_NAME:latest \
            --push \
            .
